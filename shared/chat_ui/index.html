<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM_H4CK_101</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <span class="logo-text">LLM_H4CK_101</span>
        </div>
        <div class="sidebar-lab-info">
            <div class="lab-badge" id="lab-badge">LAB</div>
            <h2 id="lab-title">Loading...</h2>
            <p id="lab-subtitle" class="lab-description"></p>
        </div>
        <div class="sidebar-footer">
            <div class="warning-banner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="warning-icon"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>Intentionally vulnerable — do not expose publicly</span>
            </div>
        </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
        <div id="chat-box" class="chat-box">
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </div>
                <h2>How can I help you today?</h2>
                <p class="welcome-hint">Try to extract sensitive information from this AI assistant.</p>
            </div>
        </div>

        <div class="input-area">
            <form id="chat-form" class="input-form">
                <div class="input-wrapper">
                    <textarea
                        id="user-input"
                        placeholder="Message the assistant..."
                        rows="1"
                        autocomplete="off"
                        autofocus
                    ></textarea>
                    <button type="submit" id="send-btn" aria-label="Send message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </form>
            <p class="input-disclaimer">LLM_H4CK_101 — educational security lab. Responses may be manipulated by design.</p>
        </div>
    </main>

    <script src="/static/chat.js"></script>
</body>
</html>
